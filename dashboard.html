<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard — Attendance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        
        <!-- Welcome Banner (auto-hides after 2s) -->
        <div id="welcomeBanner" class="welcome-banner hidden">
            <h2>👋 Welcome back, <span id="welcomeName"></span>!</h2>
        </div>
        
        <div class="dashboard">
            
            <!-- Header -->
            <div class="dash-header">
                <div class="dash-header-left">
                    <h1 id="dashTitle">Today</h1>
                    <p id="dashDate" class="date-display">Loading...</p>
                    <p style="font-size:12px; color:var(--text-tertiary); margin-top:2px;">
                        <span id="dashUserName"></span> · <span id="dashStudentId"></span>
                    </p>
                </div>
                <button id="logoutBtn" class="btn-logout">Logout</button>
            </div>
            
            <!-- Session Info Banner (visible after 11am) -->
            <div id="sessionInfo" class="session-info hidden">
                🕐 Today's session closed at 11:00 AM. You are now voting for tomorrow.
            </div>
            
            <!-- Live Count -->
            <div class="card">
                <span id="sessionTag" class="session-tag active">● ACTIVE</span>
                <div class="card-title">Live Count</div>
                <div class="count-grid">
                    <div class="count-box coming">
                        <span class="count-number" id="yesCount">0</span>
                        <span class="count-label">Coming</span>
                    </div>
                    <div class="count-box not-coming">
                        <span class="count-number" id="noCount">0</span>
                        <span class="count-label">Not Coming</span>
                    </div>
                    <div class="count-box total">
                        <span class="count-number" id="totalCount">0</span>
                        <span class="count-label">Responded</span>
                    </div>
                </div>
            </div>
            
            <!-- Vote Section -->
            <div id="voteSection" class="card vote-section">
                <p class="vote-question" id="voteQuestion">Will you come today?</p>
                
                <div id="voteButtons" class="vote-buttons">
                    <button id="voteYesBtn" class="btn-vote btn-yes">✅ Yes</button>
                    <button id="voteNoBtn" class="btn-vote btn-no">❌ No</button>
                </div>
                
                <div id="votedStatus" class="voted-status hidden">
                    <p>You voted:</p>
                    <span id="votedBadge" class="status-badge coming">Coming</span>
                    <button id="changeVoteBtn" class="btn-change hidden">Change Vote</button>
                </div>
            </div>
            
            <!-- Everyone's Responses -->
            <div class="card">
                <div class="card-title">Who's Responded</div>
                <div id="responsesList">
                    <p class="text-muted">No responses yet.</p>
                </div>
            </div>
            
            <!-- Last 7 Days History -->
            <div class="history-section">
                <div class="section-title">📅 Last 7 Days</div>
                <div id="historyContainer">
                    <p class="text-muted">Loading...</p>
                </div>
            </div>
            
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
